<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onyx Resources</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --text: #e8e8e8;
      --muted: #555;
      --tag-bg: rgba(200,255,0,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 60px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 680px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 56px;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .eyebrow::after {
      content: '';
      height: 1px;
      width: 40px;
      background: var(--accent);
      opacity: 0.5;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #fff;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      font-family: 'Space Mono', monospace;
      font-weight: 400;
    }

    /* Section */
    .section {
      margin-bottom: 40px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* Cards */
    .card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 20px;
      margin-bottom: 8px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateX(3px);
    }

    .card:hover::before {
      background: var(--accent);
    }

    .card-body {
      flex: 1;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .card-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      transition: color 0.2s, transform 0.2s;
      align-self: center;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--accent);
      border: 1px solid rgba(200,255,0,0.25);
      border-radius: 3px;
      padding: 2px 7px;
      margin-left: 8px;
      vertical-align: middle;
    }

    footer {
      margin-top: 64px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--border);
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.5s ease both; }
    .section:nth-child(1) { animation: fadeUp 0.5s 0.1s ease both; }
    .section:nth-child(2) { animation: fadeUp 0.5s 0.2s ease both; }
    .section:nth-child(3) { animation: fadeUp 0.5s 0.3s ease both; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="eyebrow">onyx-misc</div>
      <h1>📚 Re<span>sources</span></h1>
      <p class="subtitle">// guides, tips &amp; misc</p>
    </header>

    <div class="section">
      <div class="section-label">Audio Streaming</div>

      <a class="card" href="./using-listen2myradio.html">
        <div class="card-body">
          <div class="card-title">Using Listen2MyRadio <span class="tag">Recommended</span></div>
          <div class="card-desc">runs remotely — stable &amp; reliable</div>
        </div>
        <div class="card-arrow">→</div>
      </a>

      <a class="card" href="./Self-hosted-ish.html">
        <div class="card-body">
          <div class="card-title">Self-Hosted-ish</div>
          <div class="card-desc">runs locally — may be laggier</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
    </div>

    <div class="section">
      <div class="section-label">Discord</div>

      <a class="card" href="./discord-bot.html">
        <div class="card-body">
          <div class="card-title">Creating a Discord Bot</div>
          <div class="card-desc">step-by-step guide — python &amp; javascript</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
    </div>

    <footer>norwayonyx / onyx-misc</footer>

  </div>
</body>
</html>
